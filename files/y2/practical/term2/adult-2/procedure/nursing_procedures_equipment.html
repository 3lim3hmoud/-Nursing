<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Adult Nursing II — Procedures</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef3f7;
    --card: #ffffff;
    --primary: #1e5f7a;
    --primary-light: #2d7a9a;
    --secondary: #3a8c78;
    --accent: #d6eaf5;
    --accent2: #d4ede7;
    --text: #1c2d3a;
    --text-mid: #4a6070;
    --text-light: #7a96a8;
    --border: #ccdde8;
    --row-odd: #f5f9fc;
    --row-even: #ffffff;
    --header-bg: #1e5f7a;
    --tab-active: #1e5f7a;
    --tab-hover: #e6f0f6;
    --shadow: 0 2px 12px rgba(30,95,122,0.10);
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ─── HEADER ─── */
  .site-header {
    background: linear-gradient(135deg, #14435c 0%, #1e5f7a 55%, #2d8a74 100%);
    color: #fff;
    padding: 28px 32px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(14,50,70,0.25);
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    letter-spacing: .5px;
    margin-bottom: 4px;
  }
  .site-header p {
    font-size: .95rem;
    opacity: .8;
    font-weight: 300;
    letter-spacing: .3px;
  }

  /* ─── LAYOUT ─── */
  .app-wrap { display: flex; gap: 0; min-height: calc(100vh - 100px); }

  /* ─── SIDEBAR (procedure tabs) ─── */
  .sidebar {
    width: 220px;
    min-width: 200px;
    background: var(--card);
    border-right: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 0;
    gap: 2px;
    box-shadow: 2px 0 10px rgba(30,95,122,0.07);
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: .7rem;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0 16px 8px;
    margin-top: 4px;
  }
  .proc-tab {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .2s;
    font-size: .88rem;
    color: var(--text-mid);
    user-select: none;
    line-height: 1.35;
  }
  .proc-tab:hover { background: var(--tab-hover); color: var(--primary); }
  .proc-tab.active {
    border-left-color: var(--primary);
    background: var(--accent);
    color: var(--primary);
    font-weight: 700;
  }
  .proc-tab .tab-en { display: block; }
  .proc-tab .tab-ar { display: block; font-size: .78rem; color: var(--text-light); margin-top: 1px; }
  .proc-tab.active .tab-ar { color: var(--primary-light); }

  /* ─── CONTENT ─── */
  .content-area {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
  }

  .proc-content { display: none; }
  .proc-content.active { display: block; }

  .content-title {
    margin-bottom: 18px;
  }
  .content-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--primary);
  }
  .content-title p {
    font-size: .9rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* ─── SUB-TABS ─── */
  .sub-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0;
  }
  .sub-tab {
    padding: 8px 22px;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 500;
    color: var(--text-mid);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all .2s;
    user-select: none;
  }
  .sub-tab:hover { color: var(--primary); }
  .sub-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 700;
  }

  .sub-content { display: none; }
  .sub-content.active { display: block; }

  /* ─── PROCEDURE TABLE ─── */
  .proc-table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
  }

  .proc-table {
    width: 100%;
    border-collapse: collapse;
    direction: rtl;
    font-size: .88rem;
  }

  .proc-table thead tr {
    background: var(--header-bg);
    color: #fff;
  }
  .proc-table thead th {
    padding: 13px 16px;
    text-align: right;
    font-weight: 600;
    font-size: .85rem;
    letter-spacing: .3px;
    white-space: nowrap;
  }
  .proc-table thead th:first-child { width: 52px; text-align: center; }

  .proc-table tbody tr:nth-child(odd) { background: var(--row-odd); }
  .proc-table tbody tr:nth-child(even) { background: var(--row-even); }
  .proc-table tbody tr { transition: background .15s; vertical-align: top; }
  .proc-table tbody tr:hover { background: #e0eff8; }

  .proc-table td {
    padding: 12px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .proc-table td:first-child {
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: .9rem;
    white-space: nowrap;
    border-right: 3px solid var(--primary);
    width: 52px;
  }

  .cell-en {
    display: block;
    color: var(--text);
    font-weight: 500;
    line-height: 1.55;
  }
  .cell-ar {
    display: block;
    color: var(--text-light);
    font-size: .83rem;
    margin-top: 3px;
    line-height: 1.55;
  }

  .rationale-cell .cell-en { color: var(--secondary); font-weight: 500; font-style: italic; }
  .rationale-cell .cell-ar { color: #7ab0a0; }

  /* substeps */
  .substeps { margin: 5px 0 0; padding-right: 14px; list-style: none; }
  .substeps li {
    position: relative;
    padding-right: 14px;
    margin-bottom: 4px;
    font-size: .86rem;
  }
  .substeps li::before {
    content: '◈';
    position: absolute;
    right: 0;
    color: var(--primary-light);
    font-size: .65rem;
    top: 4px;
  }
  .substeps li .cell-ar { font-size: .8rem; }

  /* ─── EQUIPMENT LIST ─── */
  .equip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .equip-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--primary);
    margin: 20px 0 10px;
    padding-bottom: 5px;
    border-bottom: 2px solid var(--accent);
  }
  .equip-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 15px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    box-shadow: 0 1px 5px rgba(30,95,122,0.06);
    transition: box-shadow .2s;
  }
  .equip-item:hover { box-shadow: 0 3px 14px rgba(30,95,122,0.13); }
  .equip-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem;
    flex-shrink: 0;
    color: var(--primary);
  }
  .equip-text { flex: 1; }
  .equip-text .en { font-weight: 500; font-size: .88rem; color: var(--text); line-height: 1.4; }
  .equip-text .ar { font-size: .8rem; color: var(--text-light); margin-top: 2px; }

  .no-checklist-note {
    background: #fff8e8;
    border: 1.5px solid #f0c870;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 18px;
    font-size: .9rem;
    color: #8a6a00;
  }
  .no-checklist-note span { display: block; color: #a07800; font-size: .82rem; margin-top: 3px; }

  /* ─── RESPONSIVE ─── */
  @media(max-width: 720px){
    .app-wrap { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1.5px solid var(--border); padding: 10px; }
    .proc-tab { border-left: none; border-bottom: 3px solid transparent; padding: 7px 10px; font-size: .8rem; }
    .proc-tab.active { border-bottom-color: var(--primary); border-left: none; background: var(--accent); }
    .sidebar-label { display: none; }
    .content-area { padding: 14px; }
    .equip-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Clinical Adult Nursing II</h1>
  <p>Medical Surgical Nursing Department — Al Ryada University &nbsp;|&nbsp; قسم تمريض الباطنة والجراحة</p>
</header>

<div class="app-wrap">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Procedures / الإجراءات</div>
    <!-- Tabs rendered by JS -->
  </nav>

  <main class="content-area" id="contentArea">
    <!-- Content rendered by JS -->
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════ */
const procedures = [

  /* ─── 1. CAST CARE ─── */
  {
    id: 'cast',
    name: { en: 'Cast Care', ar: 'رعاية الجبس' },
    steps: [
      {
        action: { en: 'Wash hands, wear gloves and apron', ar: 'اغسل يديك، ارتدِ قفازات ومريلة' },
        rationale: { en: 'Prevents cross-infection between nurse and patient', ar: 'يمنع انتقال العدوى بين الممرض والمريض' }
      },
      {
        action: { en: 'Support the body part to be casted and position it in normal anatomical position', ar: 'ادعم الجزء المراد تجبيسه وضعه في وضعه التشريحي الطبيعي' },
        rationale: { en: 'Ensures correct alignment for proper healing and function', ar: 'يضمن المحاذاة الصحيحة للشفاء السليم' }
      },
      {
        action: { en: 'Drape the patient', ar: 'غطِّ المريض' },
        rationale: { en: 'Provides privacy and protects from cold', ar: 'يوفر الخصوصية ويحمي من البرد' }
      },
      {
        action: { en: 'Wash and dry the part to be casted', ar: 'اغسل وجفف الجزء المراد تجبيسه' },
        rationale: { en: 'Clean, dry skin prevents infection beneath the cast', ar: 'الجلد النظيف الجاف يمنع العدوى تحت الجبس' }
      },
      {
        action: { en: 'Place knitted (stockinette) material over the part, allowing extra length at edges', ar: 'ضع مادة شبكية (ستوكينيت) فوق الجزء مع ترك حافة إضافية' },
        rationale: { en: 'Protects skin from direct contact with casting material', ar: 'يحمي الجلد من الاحتكاك المباشر بمادة الجبس' }
      },
      {
        action: { en: 'Wrap soft, nonwoven roll padding smoothly and evenly; add extra padding at bony prominences', ar: 'لفّ الحشوة اللينة بانتظام وبشكل أملس؛ أضف حشوة إضافية فوق البروزات العظمية' },
        rationale: { en: 'Prevents pressure sores and neurovascular compromise over bony areas', ar: 'يمنع قرح الضغط والضغط على الأوعية والأعصاب فوق البروزات العظمية' }
      },
      {
        action: { en: 'Apply plaster or non-plaster casting material evenly on the body part', ar: 'ضع مادة الجبس بالتساوي على الجزء المصاب' },
        rationale: { en: 'Uniform application ensures even cast strength and support', ar: 'التطبيق المنتظم يضمن قوة ودعمًا متساويًا للجبس' }
      },
      {
        action: { en: 'Choose the appropriate width bandage for the area being casted', ar: 'اختر عرض الضمادة المناسب للمنطقة المراد تجبيسها' },
        rationale: { en: 'Correct width ensures proper coverage and moulding', ar: 'العرض الصحيح يضمن التغطية والتشكيل الصحيح' }
      },
      {
        action: { en: 'Overlap each preceding turn by half the width of the bandage', ar: 'تداخل كل لفة مع السابقة بمقدار نصف عرض الضمادة' },
        rationale: { en: 'Creates a double-layered, strong and uniform cast', ar: 'يوفر جبسًا مزدوج الطبقات قويًا ومتماسكًا' }
      },
      {
        action: { en: 'Apply additional casting material (splints) at joints and stress points', ar: 'أضف مواد تجبيس إضافية (جبائر) عند المفاصل ونقاط الإجهاد' },
        rationale: { en: 'Reinforces areas prone to cracking under movement stress', ar: 'يعزز المناطق المعرضة للكسر تحت ضغط الحركة' }
      },
      {
        action: { en: 'Finish cast: smooth edges, trim and reshape with cast cutter if needed', ar: 'أنهِ الجبس: جملّد الحواف، قص وأعد التشكيل بالمنشار إذا لزم' },
        rationale: { en: 'Prevents skin injury from sharp or rough cast edges', ar: 'يمنع إصابة الجلد من حواف الجبس الخشنة أو الحادة' }
      },
      {
        action: { en: 'Remove particles of casting material from the patient\'s skin', ar: 'أزل جزيئات مادة الجبس من جلد المريض' },
        rationale: { en: 'Prevents skin irritation and breakdown', ar: 'يمنع تهيج الجلد والتقرحات' }
      },
      {
        action: { en: 'Handle hardening casts with palms of hands; support on a firm, smooth surface', ar: 'تعامل مع الجبس وهو يتصلب بباطن الكفين؛ ادعمه على سطح مستوٍ صلب' },
        rationale: { en: 'Finger indentations create pressure points that cause sores inside the cast', ar: 'الضغط بالأصابع يصنع نقاط ضغط تسبب قرحًا داخل الجبس' }
      },
      {
        action: { en: 'Do not rest cast on hard or sharp surfaces; avoid pressure on it', ar: 'لا تضع الجبس على أسطح صلبة أو حادة؛ تجنب الضغط عليه' },
        rationale: { en: 'Prevents cast deformity while still soft', ar: 'يمنع تشوه الجبس أثناء مرحلة الصلابة' }
      },
      {
        action: { en: 'Promote drying of the cast', ar: 'شجع على جفاف الجبس بشكل كامل' },
        rationale: { en: 'A fully dried cast provides maximum structural support', ar: 'الجبس الجاف تمامًا يوفر أقصى قدر من الدعم الهيكلي' }
      },
      {
        action: { en: 'Leave cast uncovered until completely dry', ar: 'اترك الجبس بدون غطاء حتى يجف تمامًا' },
        rationale: { en: 'Air circulation speeds drying and prevents moisture buildup', ar: 'تدوير الهواء يسرع الجفاف ويمنع تراكم الرطوبة' }
      },
      {
        action: { en: 'Clean the equipment used, return to usual places, and discard used materials', ar: 'نظف الأدوات المستخدمة وأعدها لأماكنها، وتخلص من المواد المستعملة' },
        rationale: { en: 'Maintains a safe, organized clinical environment', ar: 'يحافظ على بيئة سريرية آمنة ومنظمة' }
      },
      {
        action: { en: 'Wash hands and complete documentation', ar: 'اغسل يديك وأكمل التوثيق' },
        rationale: { en: 'Prevents cross-infection; documentation ensures legal record and continuity of care', ar: 'يمنع العدوى؛ التوثيق يضمن السجل القانوني واستمرارية الرعاية' }
      }
    ],
    equipment: {
      sections: [
        {
          title: 'Cast Application / تطبيق الجبس',
          items: [
            { en: 'Cast materials (appropriate size & quantity)', ar: 'مواد الجبس (الحجم والكمية المناسبة)' },
            { en: 'Cast padding or stockinette', ar: 'بطانة الجبس أو الستوكينيت' },
            { en: 'Pail of water', ar: 'دلو ماء' },
            { en: 'Gloves and apron', ar: 'قفازات ومريلة' },
            { en: 'Plastic drapes or sheets', ar: 'أغطية بلاستيكية' },

            { en: 'Cart, chair, or fracture table', ar: 'عربة أو كرسي أو طاولة كسور' }

        },
        {
          title: 'Cast Removal / إزالة الجبس',
          items: [
            { en: 'Cast cutter (cast saw)', ar: 'منشار الجبس' },
            { en: 'Cast spreader', ar: 'موسع الجبس' },
            { en: 'Scissors and skin lotion', ar: 'مقص ولوشن للجلد' },
            { en: 'Basin, water, washcloths, and towels', ar: 'حوض وماء وفوط غسيل ومناشف' },
            { en: 'Appropriate supportive device (e.g., elastic stocking)', ar: 'وسيلة دعم مناسبة (مثل جورب ضاغط)' }
          ]
        }
      ]
    }
  },

  /* ─── 2. SKIN TRACTION ─── */
  {
    id: 'traction',
    name: { en: 'Skin Traction', ar: 'جر الجلد' },
    steps: [
      {
        action: { en: 'Wash hands and explain the procedure to the client', ar: 'اغسل يديك واشرح الإجراء للمريض' },
        rationale: { en: 'Reduces infection risk and patient anxiety; promotes cooperation', ar: 'يقلل خطر العدوى ويخفف قلق المريض ويعزز التعاون' }
      },
      {
        action: { en: 'Prepare the client and the area of the body to be placed in traction', ar: 'جهز المريض ومنطقة الجسم التي ستوضع في الجر' },
        rationale: { en: 'Proper preparation ensures accurate and comfortable traction placement', ar: 'التحضير السليم يضمن تطبيق الجر بشكل صحيح ومريح' }
      },
      {
        action: {
          en: 'Position client as requested by physician — or apply halter, strips, or elastic bandages while physician and assistants hold client\'s tissues in the desired position',
          ar: 'ضع المريض كما طلب الطبيب — أو ضع الحزام والشرائط أو الضمادات المرنة بينما يمسك الطبيب والمساعدون أنسجة المريض في الوضع المطلوب'
        },
        rationale: { en: 'Maintains correct anatomical alignment during traction application', ar: 'يحافظ على المحاذاة التشريحية الصحيحة أثناء تطبيق الجر' }
      },
      {
        action: { en: 'Assist with application of the traction equipment', ar: 'ساعد في تطبيق معدات الجر' },
        rationale: { en: 'Teamwork ensures correct, safe, and efficient equipment placement', ar: 'العمل الجماعي يضمن وضع المعدات بشكل صحيح وآمن وفعال' }
      },
      {
        action: {
          en: 'Assist with attachment of spreader bars, ropes, and pulleys. Ropes are tied securely in knots and passed through the grooves of pulleys to the weights',
          ar: 'ساعد في تركيب قضبان التوزيع والحبال والبكر. تُربط الحبال بإحكام وتمر في أخاديد البكر حتى الأثقال'
        },
        rationale: { en: 'Proper attachment distributes traction force evenly and prevents equipment failure', ar: 'التركيب الصحيح يوزع قوة الجر بالتساوي ويمنع فشل المعدات' }
      },
      {
        action: {
          en: 'When all materials and spreader bars are in place, place weights on the weight holder, hook to the rope loop, and lower slowly and gently until rope is taut',

        },
        rationale: { en: 'Gradual lowering prevents sudden pull that could cause pain or injury', ar: 'الإنزال التدريجي يمنع الشد المفاجئ الذي قد يسبب الألم أو الإصابة' }
      },
      {
        action: { en: 'Ask client how traction affects the injured tissues and raise side rails as appropriate', ar: 'اسأل المريض عن تأثير الجر على الأنسجة المصابة وارفع حواجز السرير حسب الحاجة' },
        rationale: { en: 'Monitors therapeutic effectiveness and ensures patient safety', ar: 'يراقب فعالية العلاج ويضمن سلامة المريض' }
      },
      {
        action: { en: 'Gather unused materials, return to storage areas, and wash hands', ar: 'اجمع المواد غير المستخدمة وأعدها لأماكن التخزين، ثم اغسل يديك' },
        rationale: { en: 'Maintains clean environment and prevents infection transmission', ar: 'يحافظ على بيئة نظيفة ويمنع انتقال العدوى' }
      }
    ],
    equipment: {
      sections: [
        {
          title: 'Skin Traction / جر الجلد',
          items: [
            { en: 'Bed frame (or portable attachment frame)', ar: 'إطار السرير أو إطار تثبيت محمول' },
            { en: 'Ropes, pulleys, weights, and weight holder', ar: 'حبال وبكر وأثقال وحامل الأثقال' },
            { en: 'Spreader bars', ar: 'قضبان التوزيع' },
            { en: 'Heel or elbow protectors', ar: 'واقيات الكعب أو الكوع' },
            { en: 'Boots or straps (for Buck\'s traction)', ar: 'أحذية أو أربطة (لجر بَك)' },
            { en: 'Pelvic strap or belt (for pelvic traction)', ar: 'حزام الحوض (لجر الحوض)' },
            { en: 'Elastic bandages and adhesive strips', ar: 'أربطة مرنة ولاصقات' }
          ]
        },
        {
          title: 'Skeletal Traction / الجر الهيكلي',
          items: [

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
const sidebar = document.getElementById('sidebar');
const contentArea = document.getElementById('contentArea');

procedures.forEach((proc, idx) => {
  /* Sidebar tab */
  const tab = document.createElement('div');
  tab.className = 'proc-tab' + (idx === 0 ? ' active' : '');
  tab.innerHTML = `<span class="tab-en">${proc.name.en}</span><span class="tab-ar">${proc.name.ar}</span>`;
  tab.addEventListener('click', () => selectProc(idx));
  sidebar.appendChild(tab);

  /* Content panel */
  const panel = document.createElement('div');
  panel.className = 'proc-content' + (idx === 0 ? ' active' : '');
  panel.id = 'panel-' + idx;

  let html = `<div class="content-title">
    <h2>${proc.name.en}</h2>
    <p>${proc.name.ar}</p>
  </div>`;

  if (proc.equipmentOnly) {
    /* Equipment-only notice */
    html += `<div class="no-checklist-note">
      ℹ️ No performance checklist is available for this procedure. Equipment list is provided below.
      <span>لا يوجد قائمة أداء لهذا الإجراء. يُعرض أدناه قائمة المعدات فقط.</span>
    </div>`;
    html += renderEquipment(proc.equipment);
  } else {
    /* Sub-tabs */
    html += `<div class="sub-tabs">
      <div class="sub-tab active" data-panel="proc-${idx}">📋 Procedure / الإجراء</div>
      <div class="sub-tab" data-panel="equip-${idx}">🧰 Equipment / المعدات</div>
    </div>`;

    /* Procedure sub-content */
    html += `<div class="sub-content active" id="proc-${idx}">`;
    html += renderProcedureTable(proc.steps);
    html += `</div>`;

    /* Equipment sub-content */
    html += `<div class="sub-content" id="equip-${idx}">`;
    html += renderEquipment(proc.equipment);
    html += `</div>`;
  }

  panel.innerHTML = html;
  contentArea.appendChild(panel);

  /* Sub-tab events */
  panel.querySelectorAll('.sub-tab').forEach(st => {
    st.addEventListener('click', () => {
      panel.querySelectorAll('.sub-tab').forEach(x => x.classList.remove('active'));
      panel.querySelectorAll('.sub-content').forEach(x => x.classList.remove('active'));
      st.classList.add('active');
      document.getElementById(st.dataset.panel).classList.add('active');
    });
  });
});

function selectProc(idx) {
  document.querySelectorAll('.proc-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.proc-content').forEach((p, i) => p.classList.toggle('active', i === idx));
}

function renderProcedureTable(steps) {
  let rows = '';
  steps.forEach((step, i) => {
    let actionHtml = `<span class="cell-en">${step.action.en}</span><span class="cell-ar">${step.action.ar}</span>`;
    if (step.substeps && step.substeps.length) {
      actionHtml += `<ul class="substeps">`;
      step.substeps.forEach(s => {
        actionHtml += `<li><span class="cell-en">${s.en}</span><span class="cell-ar">${s.ar}</span></li>`;
      });
      actionHtml += `</ul>`;
    }
    rows += `<tr>
      <td>${i + 1}</td>
      <td>${actionHtml}</td>
      <td class="rationale-cell">
        <span class="cell-en">${step.rationale.en}</span>
        <span class="cell-ar">${step.rationale.ar}</span>
      </td>
    </tr>`;
  });
  return `<div class="proc-table-wrap">
    <table class="proc-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nursing Action / الإجراء التمريضي</th>
          <th>Rationale / الأساس العلمي</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderEquipment(equipment) {
  let html = '';
  equipment.sections.forEach(sec => {
    html += `<h3 class="equip-section-title">${sec.title}</h3>`;
    html += `<div class="equip-grid">`;
    sec.items.forEach(item => {
      html += `<div class="equip-item">
        <div class="equip-icon">⚕</div>
        <div class="equip-text">
          <div class="en">${item.en}</div>
          <div class="ar">${item.ar}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}
