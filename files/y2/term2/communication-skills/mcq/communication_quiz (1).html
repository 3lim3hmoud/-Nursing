<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Quiz Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;min-height:100vh;color:#2c3e50}
.ar{font-family:'Cairo',sans-serif;direction:rtl;text-align:right}

/* ===== LANDING ===== */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f2c54 0%,#1a5276 50%,#2980b9 100%);padding:40px;gap:32px}
#landing .logo{font-size:4rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
#landing h1{color:white;font-size:2.4rem;text-align:center;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
#landing p{color:#a8d4f0;font-size:1.1rem;text-align:center;max-width:500px;line-height:1.7}
.lang-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.lang-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.3);border-radius:20px;padding:28px 40px;cursor:pointer;transition:all 0.25s;text-align:center;min-width:240px;color:white}
.lang-card:hover{background:rgba(255,255,255,0.22);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.3)}
.lang-card .flag{font-size:2.5rem;margin-bottom:10px}
.lang-card h3{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.lang-card p{font-size:0.9rem;opacity:0.8}

/* ===== QUIZ LAYOUT ===== */
#quiz{display:none;max-width:960px;margin:0 auto;padding:16px}
.top-bar{background:#0f2c54;color:white;padding:14px 22px;border-radius:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.top-bar-left h2{font-size:1rem;opacity:0.8;font-weight:600}
.top-bar-left .q-counter{font-size:1.5rem;font-weight:800}
.score-badge{background:rgba(255,255,255,0.15);padding:8px 18px;border-radius:30px;font-size:0.9rem;font-weight:700}
.progress-track{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#52c41a,#a0e020);border-radius:3px;transition:width 0.4s}

.nav-panel{background:white;border-radius:14px;padding:14px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.nav-panel-title{font-size:0.8rem;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.nav-dots{display:flex;flex-wrap:wrap;gap:5px}
.ndot{width:34px;height:34px;border-radius:50%;border:2px solid #e0e7ef;cursor:pointer;font-size:0.75rem;font-weight:700;background:white;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:#555}
.ndot:hover{border-color:#2980b9;color:#2980b9}
.ndot.cur{border-color:#2980b9;background:#2980b9;color:white}
.ndot.ok{border-color:#52c41a;background:#52c41a;color:white}
.ndot.err{border-color:#e74c3c;background:#e74c3c;color:white}

.q-card{background:white;border-radius:18px;padding:28px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,0.09);border:1px solid #e8edf2}
.q-badge{display:inline-block;background:#e8f4ff;color:#2980b9;font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.q-type-badge{display:inline-block;font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:8px}
.type-mcq{background:#fff3cd;color:#856404}
.type-tf{background:#d1ecf1;color:#0c5460}
.type-fill{background:#f8d7da;color:#721c24}

.q-text{font-size:1.05rem;line-height:1.85;color:#2c3e50;margin-bottom:18px;font-weight:600}
.q-text-ar{font-size:1.05rem;line-height:2;color:#5d4037;margin-top:14px;padding-top:14px;border-top:2px dashed #e0e7ef;font-family:'Cairo',sans-serif;direction:rtl;text-align:right}

/* ===== MCQ ===== */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:13px 18px;border:2px solid #e8edf2;border-radius:12px;cursor:pointer;font-size:0.97rem;line-height:1.5;transition:all 0.15s;background:white;text-align:left;display:flex;align-items:flex-start;gap:12px;color:#2c3e50}
.opt:hover{border-color:#2980b9;background:#f0f7ff}
.opt.sel{border-color:#2980b9;background:#e8f4ff}
.opt.ok{border-color:#52c41a !important;background:#f0faf0 !important;color:#276221 !important}
.opt.err{border-color:#e74c3c !important;background:#fff0f0 !important;color:#b71c1c !important}
.opt-letter{width:26px;height:26px;border-radius:50%;background:#e8edf2;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:800;flex-shrink:0;margin-top:1px}
.opt.sel .opt-letter{background:#2980b9;color:white}
.opt.ok .opt-letter{background:#52c41a;color:white}
.opt.err .opt-letter{background:#e74c3c;color:white}
.opt-ar{font-size:0.9rem;color:#5d4037;margin-top:4px;font-family:'Cairo',sans-serif;direction:rtl;text-align:right}

/* ===== T/F ===== */
.tf-row{display:flex;gap:14px}
.tf-btn{flex:1;padding:16px;border:2px solid #e8edf2;border-radius:14px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all 0.2s;background:white}
.tf-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.1)}
.tf-t{color:#276221}
.tf-f{color:#b71c1c}
.tf-t.sel,.tf-t.ok{border-color:#52c41a;background:#f0faf0;color:#276221}
.tf-f.sel,.tf-f.ok{border-color:#52c41a;background:#f0faf0;color:#276221}
.tf-t.err,.tf-f.err{border-color:#e74c3c;background:#fff0f0;color:#b71c1c}

/* ===== FILL BLANK ===== */
.fill-text{font-size:1.05rem;line-height:2.6;color:#2c3e50}
.blank-wrap{position:relative;display:inline-block;margin:0 4px}
.blank{display:inline-flex;align-items:center;justify-content:center;min-width:110px;padding:3px 12px;background:#eef4ff;border-bottom:3px solid #2980b9;border-radius:6px;cursor:pointer;font-size:0.93rem;font-weight:700;color:#1a5276;transition:all 0.15s;white-space:nowrap;vertical-align:middle}
.blank:hover{background:#d6eaff}
.blank.filled{background:#d6eaff;border-color:#1a5276}
.blank.ok{background:#e8f8e8;border-color:#52c41a;color:#276221}
.blank.err{background:#ffecec;border-color:#e74c3c;color:#b71c1c}
.blank-placeholder{color:#999;font-style:italic;font-weight:400;font-size:0.85rem}

.opts-drop{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:white;border:2px solid #2980b9;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,0.18);z-index:1000;min-width:150px;display:none;flex-direction:column;overflow:hidden;max-height:220px;overflow-y:auto}
.opts-drop.open{display:flex}
.drop-opt{padding:10px 16px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:background 0.1s;border-bottom:1px solid #eef;white-space:nowrap;color:#2c3e50}
.drop-opt:last-child{border-bottom:none}
.drop-opt:hover{background:#f0f7ff;color:#2980b9}
.drop-opt.used{color:#bbb;text-decoration:line-through;cursor:not-allowed}
.drop-opt.used:hover{background:white;color:#bbb}

/* ===== DIAGRAM ===== */
.diagram-box{background:#f8f9fa;border:1px solid #e8edf2;border-radius:12px;padding:16px;margin-bottom:18px;overflow-x:auto}
.diagram-box svg{max-width:100%;height:auto}

/* ===== ACTIONS ===== */
.action-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;align-items:center}
.btn{padding:12px 26px;border:none;border-radius:11px;cursor:pointer;font-size:0.95rem;font-weight:700;font-family:'Nunito',sans-serif;transition:all 0.15s}
.btn-check{background:#0f2c54;color:white}
.btn-check:hover{background:#1a5276}
.btn-next{background:#52c41a;color:white}
.btn-next:hover{background:#3d9b12}
.btn-prev{background:#e8edf2;color:#555}
.btn-prev:hover{background:#d8dfe8}
.btn-reset{background:#ff9800;color:white}
.btn-reset:hover{background:#e67e00}
.feedback-box{padding:12px 18px;border-radius:10px;font-size:0.95rem;font-weight:600;margin-top:14px;display:none}
.fb-ok{background:#e8f8e8;color:#276221;border:1.5px solid #52c41a;display:block}
.fb-err{background:#ffecec;color:#b71c1c;border:1.5px solid #e74c3c;display:block}
.correct-label{font-size:0.85rem;margin-top:6px;opacity:0.8;font-weight:400}

/* ===== SCORE ===== */
#score-screen{display:none;background:white;border-radius:20px;padding:40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.score-ring{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2c54,#2980b9);color:white;box-shadow:0 8px 28px rgba(41,128,185,0.4)}
.score-num{font-size:3.2rem;font-weight:800;line-height:1}
.score-sub{font-size:0.85rem;opacity:0.75;margin-top:4px}
.score-pct{font-size:2rem;font-weight:800;color:#2980b9;margin-bottom:8px}
.score-msg{font-size:1.2rem;color:#555;margin-bottom:24px}
.score-breakdown{display:flex;gap:20px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.sb-item{background:#f8f9fa;padding:14px 22px;border-radius:12px;text-align:center}
.sb-num{font-size:1.8rem;font-weight:800}
.sb-lbl{font-size:0.8rem;color:#999;font-weight:600;text-transform:uppercase}
.sb-ok .sb-num{color:#52c41a}
.sb-err .sb-num{color:#e74c3c}
.sb-skip .sb-num{color:#ff9800}
.btn-restart{background:linear-gradient(135deg,#0f2c54,#2980b9);color:white;font-size:1rem;padding:14px 36px;border-radius:14px;border:none;cursor:pointer;font-weight:700;font-family:'Nunito',sans-serif}

/* Close dropdown on outside click */
.overlay{position:fixed;inset:0;z-index:999;display:none}
.overlay.active{display:block}

@media(max-width:600px){
  #landing h1{font-size:1.8rem}
  .lang-card{min-width:180px;padding:20px 24px}
  .q-card{padding:18px}
  .tf-row{flex-direction:column}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="logo">📡</div>
  <h1>Communication Quiz Bank</h1>
  <p>104 questions covering communication theory, models, barriers, presentation skills & study habits</p>
  <div class="lang-cards">
    <div class="lang-card" onclick="startQuiz('en')">
      <div class="flag">🇬🇧</div>
      <h3>English Only</h3>
      <p>Questions in English</p>
    </div>
    <div class="lang-card" onclick="startQuiz('both')">
      <div class="flag">🇬🇧 / 🇪🇬</div>
      <h3>English + Arabic</h3>
      <p style="font-family:'Cairo',sans-serif">إنجليزي + عربي</p>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="q-counter" id="qCounter">Q 1 / 104</div>
      <div class="q-type-label" id="qTypeLabel" style="font-size:0.85rem;opacity:0.7;margin-top:2px"></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:1%"></div></div>
    </div>
    <div class="score-badge" id="scoreBadge">⭐ Score: 0</div>
  </div>

  <div class="nav-panel">
    <div class="nav-panel-title">Questions Navigator</div>
    <div class="nav-dots" id="navDots"></div>
  </div>

  <div id="qArea"></div>

  <div id="scoreScreen" style="display:none" class="q-card">
    <div class="score-ring"><div class="score-num" id="sFinalScore">0</div><div class="score-sub">points</div></div>
    <div class="score-pct" id="sPct">0%</div>
    <div class="score-msg" id="sMsg"></div>
    <div class="score-breakdown">
      <div class="sb-item sb-ok"><div class="sb-num" id="sOk">0</div><div class="sb-lbl">✅ Correct</div></div>
      <div class="sb-item sb-err"><div class="sb-num" id="sErr">0</div><div class="sb-lbl">❌ Wrong</div></div>
      <div class="sb-item sb-skip"><div class="sb-num" id="sSkip">0</div><div class="sb-lbl">⏭ Skipped</div></div>
    </div>
    <button class="btn-restart" onclick="location.reload()">🔄 Try Again</button>
  </div>
</div>

<!-- overlay for closing dropdowns -->
<div class="overlay" id="overlay" onclick="closeAllDrops()"></div>

// ── Q27–47: TRUE/FALSE ────────────────────────────────────────────────
{id:27,type:'tf',en:{stmt:'Communication is an exchange of facts, ideas, opinions or emotions by two or more persons.',ans:true},ar:{stmt:'التواصل هو تبادل للحقائق والأفكار والآراء أو المشاعر بين شخصين أو أكثر.',ans:true}},
{id:28,type:'tf',en:{stmt:'Anger and stress are examples of a psychological barrier to communication.',ans:true},ar:{stmt:'الغضب والتوتر من أمثلة الحواجز النفسية أمام التواصل.',ans:true}},
{id:29,type:'tf',en:{stmt:'Before the message is sent to the recipient, the sender needs to decode it in an appropriate language.',ans:false},ar:{stmt:'قبل إرسال الرسالة إلى المستقبِل، يحتاج المرسِل إلى فك ترميزها بلغة مناسبة.',ans:false}},
{id:30,type:'tf',en:{stmt:'A message that includes a lot of specialist jargon and abbreviations may act as a psychological barrier.',ans:false},ar:{stmt:'قد تعمل الرسالة التي تتضمن كثيراً من المصطلحات والاختصارات المتخصصة كحاجز نفسي.',ans:false}},
{id:31,type:'tf',en:{stmt:'The personal space is used in public settings, where individuals feel detached from others, such as during speeches or in crowded areas.',ans:false},ar:{stmt:'يُستخدم الفضاء الشخصي في البيئات العامة، حيث يشعر الأفراد بالانفصال عن الآخرين.',ans:false}},
{id:32,type:'tf',en:{stmt:'Noise is a vehicle/medium by which the message is passed on to the audience.',ans:false},ar:{stmt:'الضوضاء هي وسيلة يتم من خلالها نقل الرسالة إلى الجمهور.',ans:false}},
{id:33,type:'tf',en:{stmt:'The way in which you fold your arms, cross your legs, sit, stand, walk, move your head, eyes, lips cannot reveal what you may be thinking or feeling.',ans:false},ar:{stmt:'الطريقة التي تثني بها ذراعيك، وتتقاطع بها ساقيك، وتجلس، وتقف لا يمكنها الكشف عما تفكر فيه أو تشعر به.',ans:false}},
{id:34,type:'tf',en:{stmt:'Written communication is the most common form of business communication.',ans:true},ar:{stmt:'التواصل المكتوب هو الشكل الأكثر شيوعاً في التواصل التجاري.',ans:true}},
{id:35,type:'tf',en:{stmt:'Each person in the transactional communication is both a speaker and a listener and can be simultaneously sending and receiving messages.',ans:true},ar:{stmt:'كل شخص في التواصل التبادلي هو متحدث ومستمع في آنٍ واحد ويمكنه إرسال واستقبال الرسائل في وقت واحد.',ans:true}},
{id:36,type:'tf',en:{stmt:'Interpersonal communication is also known as self-talk or thinking and refers to the ways we communicate with ourselves.',ans:false},ar:{stmt:'التواصل البيني يُعرَف أيضاً بالحديث الذاتي أو التفكير ويشير إلى الطرق التي نتواصل بها مع أنفسنا.',ans:false}},
{id:37,type:'tf',en:{stmt:'Communication is the transfer of information from one or more people to one or more other people.',ans:true},ar:{stmt:'التواصل هو نقل المعلومات من شخص أو أكثر إلى شخص آخر أو أكثر.',ans:true}},
{id:38,type:'tf',en:{stmt:'Public communication refers to any type of media that is used to communicate with mass audiences, such as books, television, radios, magazines and newspapers.',ans:false},ar:{stmt:'التواصل العام يشير إلى أي نوع من وسائل الإعلام التي تُستخدم للتواصل مع جماهير واسعة.',ans:false}},
{id:39,type:'tf',en:{stmt:'The interactive model depicts communication as a one-way process where speakers only speak and never listen.',ans:false},ar:{stmt:'يصوّر النموذج التفاعلي التواصل كعملية أحادية الاتجاه حيث يتحدث المتحدثون فقط ولا يستمعون.',ans:false}},
{id:40,type:'tf',en:{stmt:'By sending back the feedback, the communication process starts again.',ans:true},ar:{stmt:'بإرسال التغذية الراجعة، تبدأ عملية التواصل من جديد.',ans:true}},
{id:41,type:'tf',en:{stmt:'Any kind of interruption that distracts or distorts the message from being understood correctly or clearly is considered as noise.',ans:true},ar:{stmt:'أي نوع من الانقطاع يُشتت الرسالة أو يُشوهها ويمنع فهمها بشكل صحيح يُعدّ ضوضاء.',ans:true}},
{id:42,type:'tf',en:{stmt:'Paralinguistic or paralanguage features are the aspects of spoken communication that do not involve words, such as intonation and pitch of voice.',ans:true},ar:{stmt:'السمات شبه اللغوية هي جوانب التواصل الشفهي التي لا تتضمن الكلمات، كالتنغيم ودرجة الصوت.',ans:true}},
{id:43,type:'tf',en:{stmt:'It is essential for small business owners and managers to develop effective written communication skills in all employees.',ans:true},ar:{stmt:'من الضروري لأصحاب الأعمال الصغيرة والمديرين تطوير مهارات التواصل الكتابي الفعّال لدى جميع الموظفين.',ans:true}},
{id:44,type:'tf',en:{stmt:'People usually communicate verbally in face-to-face conversations such as meetings, interviews, conferences, speeches, etc.',ans:true},ar:{stmt:'يتواصل الناس عادةً لفظياً في المحادثات وجهاً لوجه كالاجتماعات والمقابلات والمؤتمرات والخطب.',ans:true}},
{id:45,type:'tf',en:{stmt:'The intimate space is used for business meetings and casual interactions with strangers. It allows for communication while maintaining a respectful distance.',ans:false},ar:{stmt:'تُستخدم المساحة الحميمة في اجتماعات العمل والتفاعلات غير الرسمية مع الغرباء.',ans:false}},
{id:46,type:'tf',en:{stmt:'Modern technology often serves to reduce the impact of physical barriers, such as geographical distance between the sender and receiver.',ans:true},ar:{stmt:'كثيراً ما تُساعد التكنولوجيا الحديثة على تقليل تأثير الحواجز الجسدية كالمسافة الجغرافية.',ans:true}},
{id:47,type:'tf',en:{stmt:'While communication is about transmitting information, effective communication focuses on ensuring that the information is received and understood as intended.',ans:true},ar:{stmt:'بينما يتعلق التواصل بنقل المعلومات، يركز التواصل الفعّال على ضمان استقبال المعلومات وفهمها كما هو مقصود.',ans:true}},

// ── Q48–54: MCQ (Presentations) ─────────────────────────────────────
{id:48,type:'mcq',
 en:{q:'If you realize you forgot to say something important three slides ago, what should you do?',
  opts:['Stop everything, panic, and try to click back through all the slides to find it.',
        'Briefly mention it when it fits the current topic, or save it for the "Summary" at the end.'],ans:1},
 ar:{q:'إذا أدركت أنك نسيت قول شيء مهم قبل ثلاث شرائح، ماذا يجب أن تفعل؟',
  opts:['أوقف كل شيء واذهب إلى الوراء لإيجاده.',

{id:49,type:'mcq',
 en:{q:'How should you handle a question from the audience that you can\'t answer?',

 ar:{q:'كيف تتعامل مع سؤال من الجمهور لا تستطيع الإجابة عليه؟',

{id:50,type:'mcq',
 en:{q:'You are making your first slide. What is the best "golden rule"?',
  opts:['Use one big, clear picture and just a few words of text.',

 ar:{q:'أنت تصنع أول شريحة لك. ما "القاعدة الذهبية" الأفضل؟',
  opts:['استخدم صورة كبيرة وواضحة وعدد قليل من الكلمات.',
        'اكتب خطابك كله على الشريحة حتى لا تنسى ما تقوله.'],ans:0}},

{id:51,type:'mcq',
 en:{q:'Your hands feel shaky because you are nervous. What should you do?',

 ar:{q:'يداك ترتجفان بسبب التوتر. ماذا يجب أن تفعل؟',
  opts:['استخدمهما للإشارة إلى شرائحك أو لعمل إيماءات طبيعية أثناء الكلام.',
        'أخفِهما في جيبيك أو وراء ظهرك.'],ans:0}},

{id:52,type:'mcq',
 en:{q:'Where should your eyes be while you are speaking?',

{id:53,type:'mcq',
 en:{q:'What should you do with your voice to keep people interested?',
  opts:['Change your speed and volume occasionally to emphasize important points.',
        'Keep the same volume and speed the whole time so you don\'t startle anyone.'],ans:0},
 ar:{q:'ما الذي يجب أن تفعله بصوتك لإبقاء الناس مهتمين؟',
  opts:['غيّر سرعتك وحجم صوتك أحياناً للتأكيد على النقاط المهمة.',
        'حافظ على نفس الحجم والسرعة طوال الوقت.'],ans:0}},

{id:54,type:'mcq',
 en:{q:'You are about to start your presentation. How should you begin?',
  opts:['Start with a strong story, a surprising fact, or a question for the audience.',
        'Start by spending 5 minutes explaining your name, your degree, and your life history.'],ans:0},
 ar:{q:'أنت على وشك بدء عرضك التقديمي. كيف يجب أن تبدأ؟',
  opts:['ابدأ بقصة قوية أو حقيقة مفاجئة أو سؤال للجمهور.',
        'ابدأ بقضاء 5 دقائق في شرح اسمك ودرجتك وتاريخ حياتك.'],ans:0}},

// ── Q55–67: TRUE/FALSE (Presentations) ──────────────────────────────
{id:55,type:'tf',en:{stmt:'Eye contact helps you connect with the people in the room.',ans:true},ar:{stmt:'التواصل البصري يساعدك على التواصل مع الناس في الغرفة.',ans:true}},
{id:56,type:'tf',en:{stmt:'Standing up straight and using your hands to gesture can make you look more confident to your audience.',ans:true},ar:{stmt:'الوقوف منتصباً واستخدام اليدين للإيماء يجعلك تبدو أكثر ثقة أمام الجمهور.',ans:true}},
{id:57,type:'tf',en:{stmt:'If you are nervous, it is a good idea to speak as fast as possible so the presentation ends sooner.',ans:false},ar:{stmt:'إذا كنت متوتراً، فمن الجيد التحدث بأسرع ما يمكن لإنهاء العرض بسرعة.',ans:false}},
{id:58,type:'tf',en:{stmt:'Using big, clear pictures on your slides is usually better than using many long sentences.',ans:true},ar:{stmt:'استخدام صور كبيرة وواضحة على شرائحك أفضل عادةً من استخدام جمل طويلة.',ans:true}},
{id:59,type:'tf',en:{stmt:'It is okay to look at your audience while you speak instead of just reading from your paper.',ans:true},ar:{stmt:'من المقبول النظر إلى جمهورك أثناء حديثك بدلاً من القراءة من ورقتك فقط.',ans:true}},
{id:60,type:'tf',en:{stmt:'A monotone voice acts like a lullaby; changing your tone keeps people awake and focused.',ans:true},ar:{stmt:'الصوت الرتيب يعمل كأغنية تنويم؛ تغيير نبرتك يُبقي الناس مستيقظين ومركّزين.',ans:true}},
{id:61,type:'tf',en:{stmt:'Smiling at your audience (when appropriate) makes them feel more comfortable and interested in what you are saying.',ans:true},ar:{stmt:'الابتسامة لجمهورك (عند الاقتضاء) تجعلهم يشعرون بمزيد من الراحة والاهتمام.',ans:true}},
{id:62,type:'tf',en:{stmt:'Ending your presentation by just saying "That\'s it" is the most professional way to finish.',ans:false},ar:{stmt:'إنهاء عرضك بقول "هذا كل شيء" فقط هو الطريقة الأكثر احترافية.',ans:false}},
{id:63,type:'tf',en:{stmt:'Arriving 10 minutes early to check the room and the equipment can help reduce your "stage fright".',ans:true},ar:{stmt:'الوصول مبكراً بـ10 دقائق للتحقق من الغرفة والمعدات يمكن أن يساعد في تقليل "رهاب المسرح".',ans:true}},
{id:64,type:'tf',en:{stmt:'You should read your slides word-for-word to make sure you don\'t make any mistakes.',ans:true},ar:{stmt:'يجب عليك قراءة شرائحك كلمة بكلمة للتأكد من عدم ارتكاب أخطاء.',ans:true}},
{id:65,type:'tf',en:{stmt:'One idea per slide is much easier for an audience to follow.',ans:true},ar:{stmt:'فكرة واحدة لكل شريحة أسهل بكثير على الجمهور لمتابعتها.',ans:true}},
{id:66,type:'tf',en:{stmt:'You should put every single word you are going to say on your PowerPoint slides.',ans:false},ar:{stmt:'يجب عليك وضع كل كلمة ستقولها على شرائح PowerPoint.',ans:false}},
{id:67,type:'tf',en:{stmt:'It is better to have 20 simple slides than 5 slides that are crowded with too much information.',ans:true},ar:{stmt:'من الأفضل أن يكون لديك 20 شريحة بسيطة من 5 شرائح مزدحمة بالمعلومات.',ans:true}},

{id:69,type:'mcq',

{id:70,type:'mcq',

{id:71,type:'mcq',

{id:72,type:'mcq',

{id:73,type:'mcq',

        'كتابة كل كلمة يقولها المعلم كالنص الحرفي.'],ans:0}},

{id:74,type:'mcq',

        'الدراسة 2 ساعة اليوم و2 ساعة غداً.'],ans:1}},

// ── Q75–88: TRUE/FALSE (Study/Listening) ────────────────────────────
{id:75,type:'tf',en:{stmt:'Active listening is only important in personal friendships, not in professional or academic settings.',ans:false},ar:{stmt:'الاستماع النشط مهم فقط في الصداقات الشخصية، وليس في البيئات المهنية أو الأكاديمية.',ans:false}},
{id:76,type:'tf',en:{stmt:'You should wait until you feel "motivated" before you start studying.',ans:false},ar:{stmt:'يجب عليك الانتظار حتى تشعر بـ"الدافعية" قبل البدء في الدراسة.',ans:false}},
{id:77,type:'tf',en:{stmt:'Writing your notes by hand usually helps you remember things better.',ans:true},ar:{stmt:'كتابة ملاحظاتك باليد عادةً يساعدك على تذكر الأشياء بشكل أفضل.',ans:true}},

// =====================================
// APP STATE
// =====================================
let lang = 'en';
let cur = 0;
let results = {}; // {qId: 'ok'|'err'|null}
let score = 0;
let userAnswers = {}; // {qId: selected (index for mcq/tf, array for fill)}

function startQuiz(mode){
  lang = mode;
  document.getElementById('landing').style.display='none';
  document.getElementById('quiz').style.display='block';
  initQuiz();
}

function initQuiz(){
  Q.forEach(q=>{ results[q.id]=null; userAnswers[q.id]=q.type==='fill'? new Array(getAnswers(q).length).fill(null) : null; });
  buildNavDots();
  showQ(0);
}

function getQ(idx){ return Q[idx]; }
function getData(q){ return lang==='both'? q.en : q[lang]||q.en; }
function getAnswers(q){ return (q.en||q).answers || []; }

function buildNavDots(){
  const c=document.getElementById('navDots'); c.innerHTML='';
  Q.forEach((q,i)=>{
    const d=document.createElement('button');
    d.className='ndot'+(i===cur?' cur':'');
    d.textContent=q.id;
    d.onclick=()=>showQ(i);
    c.appendChild(d);
  });
}

function updateNavDot(idx){
  const dots=document.querySelectorAll('.ndot');
  dots.forEach((d,i)=>{
    d.className='ndot';
    if(i===idx) d.classList.add('cur');
    const r=results[Q[i].id];
    if(r==='ok') d.classList.add('ok');
    else if(r==='err') d.classList.add('err');
  });
}

function showQ(idx){
  cur=idx;
  document.getElementById('scoreScreen').style.display='none';
  const q=Q[idx];
  document.getElementById('qCounter').textContent=`Q ${q.id} / ${Q.length}`;
  const pct=((idx+1)/Q.length*100).toFixed(0);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('scoreBadge').textContent=`⭐ Score: ${score}`;
  updateNavDot(idx);

  const area=document.getElementById('qArea');
  area.innerHTML='';
  const card=document.createElement('div');
  card.className='q-card';

  // badge
  const badge=document.createElement('div');
  const typeLabels={mcq:'Multiple Choice 🔘',tf:'True / False ✅',fill:'Fill in the Blanks ✏️'};
  const typeLang={mcq:'اختيار من متعدد',tf:'صح / خطأ',fill:'أكمل الفراغات'};
  badge.className='q-badge';
  badge.innerHTML=`Question ${q.id} <span class="q-type-badge type-${q.type}">${typeLabels[q.type]}</span>`;
  if(lang==='both') badge.innerHTML+=` <span style="font-family:Cairo,sans-serif;font-size:0.75rem;color:#5d4037;margin-right:6px">${typeLang[q.type]}</span>`;
  card.appendChild(badge);

  // diagram if any
  if(q.diagram && SVG[q.diagram]){
    const db=document.createElement('div');
    db.className='diagram-box';
    db.innerHTML=SVG[q.diagram];
    card.appendChild(db);
  }

  // render by type
  if(q.type==='mcq') renderMCQ(q,card);
  else if(q.type==='tf') renderTF(q,card);
  else renderFill(q,card);

  // actions
  const ar=document.createElement('div');
  ar.className='action-row';

  if(results[q.id]===null){
    const bc=document.createElement('button');
    bc.className='btn btn-check';
    bc.textContent='✅ Check Answer';
    bc.onclick=()=>checkAnswer(q);
    ar.appendChild(bc);
  }

  if(results[q.id]!==null){
    const br=document.createElement('button');
    br.className='btn btn-reset';
    br.textContent='🔄 Reset';
    br.onclick=()=>resetQ(q);
    ar.appendChild(br);
  }

  if(idx>0){
    const bp=document.createElement('button');
    bp.className='btn btn-prev';
    bp.textContent='← Prev';
    bp.onclick=()=>showQ(idx-1);
    ar.appendChild(bp);
  }

  if(idx<Q.length-1){
    const bn=document.createElement('button');
    bn.className='btn btn-next';
    bn.textContent='Next →';
    bn.onclick=()=>showQ(idx+1);
    ar.appendChild(bn);
  } else {
    const bf=document.createElement('button');
    bf.className='btn btn-next';
    bf.textContent='📊 See Results';
    bf.onclick=showScore;
    ar.appendChild(bf);
  }

  card.appendChild(ar);

  // feedback if already answered
  if(results[q.id]!==null){
    const fb=document.createElement('div');
    fb.className='feedback-box '+(results[q.id]==='ok'?'fb-ok':'fb-err');
    if(results[q.id]==='ok') fb.innerHTML='✅ Correct! Well done!';
    else {
      let correct='';
      const d=getData(q);
      if(q.type==='mcq') correct=d.opts[d.ans];
      else if(q.type==='tf') correct=d.ans?'True ✅':'False ❌';
      else correct=getAnswers(q).join(', ');
      fb.innerHTML=`❌ Incorrect. <span class="correct-label">Correct answer: <strong>${correct}</strong></span>`;
    }
    card.appendChild(fb);
  }

  area.appendChild(card);
}

function renderMCQ(q,card){
  const d=getData(q);
  const qtxt=document.createElement('div');
  qtxt.className='q-text';
  qtxt.textContent=d.q;
  card.appendChild(qtxt);

  if(lang==='both'){
    const qtAr=document.createElement('div');
    qtAr.className='q-text-ar ar';
    qtAr.textContent=q.ar.q;
    card.appendChild(qtAr);
  }

  const opts=document.createElement('div');
  opts.className='opts';
  const letters=['A','B','C','D'];
  d.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    const locked=results[q.id]!==null;
    if(userAnswers[q.id]===i) btn.classList.add(locked?(i===d.ans?'ok':'err'):'sel');
    if(locked && i===d.ans && userAnswers[q.id]!==i) btn.classList.add('ok');

    const lbl=document.createElement('span');
    lbl.className='opt-letter';
    lbl.textContent=letters[i]||i+1;
    btn.appendChild(lbl);

    const txt=document.createElement('div');
    txt.style.flex='1';
    txt.textContent=o;
    if(lang==='both' && q.ar && q.ar.opts && q.ar.opts[i]){
      const ar=document.createElement('div');
      ar.className='opt-ar ar';
      ar.textContent=q.ar.opts[i];
      txt.appendChild(ar);
    }
    btn.appendChild(txt);

    if(!locked) btn.onclick=()=>{ userAnswers[q.id]=i; showQ(cur); };
    opts.appendChild(btn);
  });
  card.appendChild(opts);
}

function renderTF(q,card){
  const d=getData(q);
  const qtxt=document.createElement('div');
  qtxt.className='q-text';
  qtxt.textContent=d.stmt;
  card.appendChild(qtxt);

  if(lang==='both'){
    const qtAr=document.createElement('div');
    qtAr.className='q-text-ar ar';
    qtAr.textContent=q.ar.stmt;
    card.appendChild(qtAr);
  }

  const row=document.createElement('div');
  row.className='tf-row';
  const locked=results[q.id]!==null;

  ['True ✅','False ❌'].forEach((lbl,i)=>{
    const val=i===0;
    const btn=document.createElement('button');
    btn.className='tf-btn '+(i===0?'tf-t':'tf-f');
    btn.textContent=lbl;
    if(locked){
      if(userAnswers[q.id]===val){
        btn.classList.add(val===d.ans?'ok':'err');
      } else if(val===d.ans){
        btn.classList.add('ok');
      }
    } else {
      if(userAnswers[q.id]===val) btn.classList.add('sel');
    }
    if(!locked) btn.onclick=()=>{ userAnswers[q.id]=val; showQ(cur); };
    row.appendChild(btn);
  });
  card.appendChild(row);
}

function renderFill(q,card){
  const d=getData(q);
  const answers=getAnswers(q);
  const locked=results[q.id]!==null;
  const ua=userAnswers[q.id]||new Array(answers.length).fill(null);

  // shuffle options for dropdowns
  const shuffled=[...answers].sort(()=>Math.random()-0.5);

  const ftxt=document.createElement('div');
  ftxt.className='fill-text';

  let blankIdx=0;
  d.parts.forEach(part=>{
    if(part===null){
      const bi=blankIdx++;
      const wrap=document.createElement('span');
      wrap.className='blank-wrap';

      const blank=document.createElement('span');
      blank.className='blank'+(ua[bi]?' filled':'');
      blank.dataset.bi=bi;

      if(locked){
        blank.classList.remove('filled');
        blank.classList.add(ua[bi]===answers[bi]?'ok':'err');
        blank.textContent=ua[bi]||'_____';
      } else if(ua[bi]){
        blank.textContent=ua[bi];
      } else {
        const ph=document.createElement('span');
        ph.className='blank-placeholder';
        ph.textContent='click to fill';
        blank.appendChild(ph);
      }

      if(!locked){
        blank.onclick=(e)=>{
          e.stopPropagation();
          closeAllDrops();
          drop.classList.add('open');
          document.getElementById('overlay').classList.add('active');
        };
      }

      const drop=document.createElement('div');
      drop.className='opts-drop';

      shuffled.forEach(opt=>{
        const usedByOther=ua.some((v,idx)=>v===opt && idx!==bi);
        const item=document.createElement('div');
        item.className='drop-opt'+(usedByOther?' used':'');
        item.textContent=opt;
        if(!usedByOther){
          item.onclick=(e)=>{
            e.stopPropagation();
            ua[bi]=opt;
            userAnswers[q.id]=ua;
            closeAllDrops();
            showQ(cur);
          };
        }
        drop.appendChild(item);
      });

      wrap.appendChild(blank);
      wrap.appendChild(drop);
      ftxt.appendChild(wrap);
    } else {
      // handle newlines
      const parts=part.split('\n');
      parts.forEach((p,pi)=>{
        if(pi>0) ftxt.appendChild(document.createElement('br'));
        if(p) ftxt.appendChild(document.createTextNode(p));
      });
    }
  });

  card.appendChild(ftxt);

  if(lang==='both' && q.ar){
    const sep=document.createElement('div');
    sep.style.cssText='height:2px;border-top:2px dashed #e0e7ef;margin:18px 0';
    card.appendChild(sep);

    const arData=q.ar;
    const arAnswers=arData.answers||answers;
    const arFtxt=document.createElement('div');
    arFtxt.className='fill-text ar';
    arFtxt.style.direction='rtl';
    arFtxt.style.textAlign='right';
    arFtxt.style.fontFamily="'Cairo',sans-serif";

    let arBlankIdx=0;
    arData.parts.forEach(part=>{
      if(part===null){
        const bi=arBlankIdx++;
        const arBlank=document.createElement('span');
        arBlank.className='blank';
        arBlank.style.fontFamily="'Cairo',sans-serif";
        if(locked){
          arBlank.classList.add(ua[bi]===answers[bi]?'ok':'err');
          arBlank.textContent=arAnswers[bi]||'_____';
        } else if(ua[bi]){
          arBlank.textContent=arAnswers[bi]||ua[bi];
          arBlank.classList.add('filled');
        } else {
          const ph=document.createElement('span');
          ph.className='blank-placeholder';
          ph.textContent='انقر للملء';
          arBlank.appendChild(ph);
        }
        arFtxt.appendChild(arBlank);
      } else {
        const parts=part.split('\n');
        parts.forEach((p,pi)=>{
          if(pi>0) arFtxt.appendChild(document.createElement('br'));
          if(p) arFtxt.appendChild(document.createTextNode(p));
        });
      }
    });
    card.appendChild(arFtxt);
  }
}

function closeAllDrops(){
  document.querySelectorAll('.opts-drop.open').forEach(d=>d.classList.remove('open'));
  document.getElementById('overlay').classList.remove('active');
}

function checkAnswer(q){
  const d=getData(q);
  const ua=userAnswers[q.id];

  if(q.type==='mcq'){
    if(ua===null){alert('Please select an answer first!');return;}
    const ok=ua===d.ans;
    results[q.id]=ok?'ok':'err';
    if(ok) score++;
  } else if(q.type==='tf'){
    if(ua===null){alert('Please select True or False!');return;}
    const ok=ua===d.ans;
    results[q.id]=ok?'ok':'err';
    if(ok) score++;
  } else {
    const answers=getAnswers(q);
    if(!ua||ua.some(v=>v===null)){alert('Please fill all the blanks first!');return;}
    const ok=answers.every((a,i)=>ua[i]===a);
    results[q.id]=ok?'ok':'err';
    if(ok) score++;
  }

  document.getElementById('scoreBadge').textContent=`⭐ Score: ${score}`;
  updateNavDot(cur);
  showQ(cur);
}

function resetQ(q){
  results[q.id]=null;
  userAnswers[q.id]=q.type==='fill'? new Array(getAnswers(q).length).fill(null) : null;
  showQ(cur);
}

function showScore(){
  document.getElementById('qArea').innerHTML='';
  const ss=document.getElementById('scoreScreen');
  ss.style.display='block';

  const answered=Object.values(results).filter(v=>v!==null).length;
  const correct=Object.values(results).filter(v=>v==='ok').length;
  const wrong=Object.values(results).filter(v=>v==='err').length;
  const skipped=Q.length-answered;
  const pct=Math.round(correct/Q.length*100);

  document.getElementById('sFinalScore').textContent=score;
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('sOk').textContent=correct;
  document.getElementById('sErr').textContent=wrong;
  document.getElementById('sSkip').textContent=skipped;

  const msgs=['Keep trying! 💪','Getting there! 📚','Good effort! 👍','Well done! 🌟','Great job! 🎉','Excellent! 🏆','Outstanding! 🥇'];
  const mi=Math.min(Math.floor(pct/15),6);
  document.getElementById('sMsg').textContent=msgs[mi];
}
</script>
